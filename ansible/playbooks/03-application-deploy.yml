---
# Application Deployment Playbook
# Deploys the full application stack

- name: Deploy My Resume Application
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
    - "{{ vault_vars_file | default('../group_vars/all/vault.yml') }}"

  tasks:
    - name: Clone/Update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_root }}"
        version: "{{ repo_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"

    # Prepare Node Services Environment

    - name: Create shared Node.js conda environment at project root
      command: /opt/miniconda3/bin/conda create -p {{ app_root }}/conda-env nodejs={{ nodejs_version }} -y --quiet
      args:
        creates: "{{ app_root }}/conda-env/conda-meta/history"
      become_user: "{{ ansible_user }}"
      register: conda_create_result
      changed_when: conda_create_result.rc == 0

    - name: Install PM2 in shared project conda env
      command: /opt/miniconda3/bin/conda run -p {{ app_root }}/conda-env npm install -g pm2
      args:
        creates: "{{ app_root }}/conda-env/bin/pm2"
      become_user: "{{ ansible_user }}"

    - name: Configure API Service environment
      copy:
        dest: "{{ api_service_path }}/.env"
        content: |
          DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}?schema=public"
          JWT_SECRET="{{ jwt_secret }}"
          PORT={{ api_port }}
          NODE_ENV={{ node_env }}
          LLM_SERVICE_URL="http://localhost:{{ llm_port }}"
          LLM_API_KEY="{{ llm_api_key }}"
          LLM_SERVICE_USERNAME="{{ llm_service_username }}"
          LLM_SERVICE_PASSWORD="{{ llm_service_password }}"
          CORS_ORIGINS="{{ cors_origins | join(',') }}"
          STRIPE_SECRET_KEY="{{ stripe_secret_key | default('sk_test_placeholder_not_configured') }}"
          STRIPE_WEBHOOK_SECRET="{{ stripe_webhook_secret | default('whsec_placeholder_not_configured') }}"
          STRIPE_PRICE_ID="{{ stripe_price_id | default('price_placeholder_not_configured') }}"
          AWS_REGION="{{ aws_region | default('us-east-1') }}"
          AWS_ACCESS_KEY_ID="{{ aws_access_key_id | default('') }}"
          AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key | default('') }}"
          SES_FROM_EMAIL="{{ ses_from_email | default('noreply@resumecast.ai') }}"
          FRONTEND_URL="{{ frontend_url | default('https://resumecast.ai') }}"
          API_BASE_URL="{{ api_base_url | default('https://resumecast.ai') }}"
          LLM_WEBHOOK_SECRET="{{ llm_webhook_secret | default('default_key') }}"
        owner: "{{ ansible_user }}"
        mode: "0600"

    - name: Install API Service dependencies
      shell: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate {{ app_root }}/conda-env
        npm install
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      become_user: "{{ ansible_user }}"

    # - name: Stop deployment if a variable is set
    #   meta: end_play
    #   when: stop_deploy | default(false)

    - name: Generate Prisma Client
      shell: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate {{ app_root }}/conda-env
        export DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}?schema=public"
        npx prisma generate
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      become_user: "{{ ansible_user }}"

    - name: Check if migrations exist
      stat:
        path: "{{ api_service_path }}/prisma/migrations"
      register: migrations_dir

    - name: Apply Prisma migrations (production safe)
      shell: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate {{ app_root }}/conda-env
        export DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}?schema=public"
        npx prisma migrate deploy
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      register: migration_result
      failed_when: false
      when: migrations_dir.stat.exists

    - name: Fallback to db push if no migrations
      shell: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate {{ app_root }}/conda-env
        export DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}?schema=public"
        npx prisma db push --accept-data-loss
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      when: not migrations_dir.stat.exists or migration_result.rc != 0

    - name: Verify database tables
      postgresql_query:
        db: "{{ db_name }}"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_host: localhost
        query: |
          SELECT table_name 
          FROM information_schema.tables 
          WHERE table_schema = 'public'
          ORDER BY table_name;
      register: db_tables
      become_user: postgres

    - name: Display created tables
      debug:
        msg: "Database tables: {{ db_tables.query_result | map(attribute='table_name') | list }}"

    - name: Build API Service
      shell: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate {{ app_root }}/conda-env
        npm run build
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      become_user: "{{ ansible_user }}"

    # Prepare LLM Service Environment

    - name: Ensure LLM service directory exists
      file:
        path: "{{ llm_service_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user | default(ansible_user) }}"
        mode: "0755"
      become: yes # Needed if /opt/my-resume requires root to create/write

    - name: Check if Poetry is installed
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        which poetry || echo "not_found"
      args:
        executable: /bin/bash
      register: poetry_check
      ignore_errors: yes
      changed_when: false
      become_user: "{{ ansible_user }}"

    - name: Install Poetry
      shell: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      when: '"not_found" in poetry_check.stdout'

    - name: Configure Poetry to use in-project virtualenvs
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        poetry config virtualenvs.in-project true
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"

    - name: Debug - Check Poetry and Python versions
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        echo "Poetry version:"
        poetry --version || echo "Poetry not found"
        echo "Python version:"
        python3 --version
        echo "pyproject.toml exists:"
        ls -la {{ llm_service_path }}/pyproject.toml
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      register: poetry_debug
      ignore_errors: yes

    - name: Display Poetry debug info
      debug:
        var: poetry_debug.stdout_lines

    - name: Remove old Poetry lock file
      file:
        path: "{{ llm_service_path }}/poetry.lock"
        state: absent
      become_user: "{{ ansible_user }}"

    - name: Generate fresh Poetry lock file
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        cd {{ llm_service_path }}
        poetry lock
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      register: poetry_lock

    - name: Install LLM service Python dependencies with Poetry
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        cd {{ llm_service_path }}
        poetry install --no-root --verbose
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      register: poetry_install
      failed_when: false

    - name: Display Poetry install output
      debug:
        var: poetry_install

    - name: Fail if Poetry install failed
      fail:
        msg: "Poetry installation failed. See output above for details."
      when: poetry_install.rc != 0

    - name: Retry Poetry install with cleared cache (if first attempt failed)
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        cd {{ llm_service_path }}
        poetry cache clear pypi --all -n || true
        poetry install --no-root --verbose
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      when: poetry_install.rc != 0

    - name: Install CUDA-enabled llama-cpp-python
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        cd {{ llm_service_path }}
        poetry run pip install llama-cpp-python --force-reinstall --no-cache-dir \
          --extra-index-url https://jllllll.github.io/llama-cpp-python-cuBLAS-wheels/AVX2/cu121
      args:
        executable: /bin/bash
      become_user: "{{ ansible_user }}"
      when: ansible_facts['distribution'] != 'MacOS'

    - name: Configure LLM Service environment
      copy:
        dest: "{{ llm_service_path }}/.env"
        content: |
          PORT="{{ llm_port }}"
          LLAMA_SERVER_URL="{{ llama_server_url }}"
          LLAMA_API_TYPE="{{ llama_api_type }}"
          LLAMA_MODEL="{{ llama_model }}"
          LLM_REQUEST_TIMEOUT="{{ llm_request_timeout }}"
          OLLAMA_KEEP_ALIVE="{{ ollama_keep_alive }}"
          VLLM_SERVER_URL="{{ vllm_server_url }}"
          VLLM_MODEL="{{ vllm_model }}"
          RESUME_PATH=../../data/resume.md
          DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}"
          ADMIN_TOKEN="{{ llm_admin_token }}"
          API_BASE_URL="http://localhost:{{ api_port }}/api"
          API_SERVICE_URL="{{ api_service_url }}"
          LLM_SERVICE_USERNAME="{{ llm_service_username }}"
          LLM_SERVICE_PASSWORD="{{ llm_service_password }}"
          CORS_ORIGINS="{{ cors_origins | join(',') }}"
          LLM_API_KEYS='{{ llm_authorized_api_keys }}'
        owner: "{{ ansible_user }}"
        mode: "0600"

    - name: Display resolved LLM backend
      debug:
        msg: "LLM backend for {{ inventory_hostname }}: api_type={{ llama_api_type }}, server={{ llama_server_url }}, model={{ llama_model }}, timeout={{ llm_request_timeout }}"

    - name: Check if Ollama is installed
      command: which ollama
      register: ollama_check
      ignore_errors: yes
      changed_when: false

    - name: Pull main Ollama model for chat
      command: ollama pull {{ llama_model }}
      become_user: "{{ ansible_user }}"
      when: ollama_check.rc == 0
      async: 300
      poll: 10

    - name: Pull nomic-embed-text model for embeddings
      command: ollama pull nomic-embed-text
      become_user: "{{ ansible_user }}"
      when: ollama_check.rc == 0
      async: 300
      poll: 10

    - name: Display Ollama models
      shell: ollama list
      register: llama_models
      become_user: "{{ ansible_user }}"
      when: ollama_check.rc == 0
      changed_when: false

    - name: Show installed models
      debug:
        msg: "{{ llama_models.stdout_lines }}"
      when: ollama_check.rc == 0

    # Prepare Frontend Environment

    - name: Ensure frontend directory exists
      file:
        path: "{{ frontend_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      become: yes

    - name: Verify frontend conda env was created
      stat:
        path: "{{ app_root }}/conda-env/bin/node"
      register: frontend_node_check
      become_user: "{{ ansible_user }}"

    - name: Fail if frontend conda env missing node binary
      fail:
        msg: "Frontend conda env at {{ app_root }}/conda-env does not contain node binary - creation likely failed"
      when: not frontend_node_check.stat.exists

    - name: Configure Frontend environment
      copy:
        dest: "{{ frontend_path }}/{{ item }}"
        content: |
          PUBLIC_API_URL={{ frontend_public_api_url | default(api_service_url | default('https://api.' ~ domain)) }}
          PUBLIC_LLM_API_URL={{ frontend_public_llm_url | default('https://llm.' ~ domain) }}
          PUBLIC_BASE_DOMAIN={{ frontend_public_base_domain | default(domain) }}
          PUBLIC_RESERVED_HOSTNAMES={{ frontend_reserved_hostnames | join(',') if frontend_reserved_hostnames is iterable and frontend_reserved_hostnames is not string else frontend_reserved_hostnames | default('') }}
          PUBLIC_GTM_ID={{ gtm_id }}
          PUBLIC_GA_ID={{ ga_id }}
        owner: "{{ ansible_user }}"
        mode: '0644'
      loop:
        - .env
        - .env.production
      become_user: "{{ ansible_user }}"

    - name: Install Frontend dependencies (clean reinstall to fix Rspack bindings)
      block:
        - name: Clean node_modules and lockfile (to force platform-specific bindings install)
          file:
            path: "{{ frontend_path }}/{{ item }}"
            state: absent
          loop:
            - node_modules
            - package-lock.json
          become_user: "{{ ansible_user }}"

        - name: Install frontend dependencies fresh
          command: /opt/miniconda3/bin/conda run -p {{ app_root }}/conda-env npm install
          args:
            chdir: "{{ frontend_path }}"
          become_user: "{{ ansible_user }}"
      become_user: "{{ ansible_user }}"

    - name: Build Frontend (using conda run - no activation needed)
      command: /opt/miniconda3/bin/conda run -p {{ app_root }}/conda-env npm run build
      args:
        chdir: "{{ frontend_path }}"
      become_user: "{{ ansible_user }}"
      register: frontend_build_result
      changed_when: frontend_build_result.rc == 0

    # Keep your existing verify/assert tasks - they are good
    - name: Verify Frontend build
      stat:
        path: "{{ frontend_path }}/dist/index.html"
      register: frontend_build
      become_user: "{{ ansible_user }}"

    - name: Assert Frontend build succeeded
      assert:
        that: frontend_build.stat.exists
        fail_msg: "Frontend build failed - dist/index.html not found"
        success_msg: "✅ Frontend built successfully"

    - name: Stop existing PM2 services
      command: "{{ app_root }}/conda-env/bin/pm2 delete all"
      args:
        chdir: "{{ app_root }}"
      become_user: "{{ ansible_user }}"
      ignore_errors: yes

    - name: Create PM2 ecosystem file
      template:
        src: ../templates/ecosystem.config.js.j2
        dest: "{{ app_root }}/ecosystem.config.js"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Start services with PM2
      command: "{{ app_root }}/conda-env/bin/pm2 start ecosystem.config.js"
      args:
        chdir: "{{ app_root }}"
      become_user: "{{ ansible_user }}"

    - name: Save PM2 configuration
      command: "{{ app_root }}/conda-env/bin/pm2 save --force"
      args:
        chdir: "{{ app_root }}"
      become_user: "{{ ansible_user }}"

    - name: Generate PM2 systemd startup instructions
      command: "{{ app_root }}/conda-env/bin/pm2 startup systemd -u {{ ansible_user }} --hp /home/{{ ansible_user }}"
      register: pm2_startup
      become_user: "{{ ansible_user }}"
      changed_when: false
      ignore_errors: true

    - name: Install PM2 systemd service using full pm2 path
      command: >-
        sudo env PATH=$PATH:/opt/my-resume/conda-env/bin
        {{ app_root }}/conda-env/bin/pm2 startup systemd -u {{ ansible_user }} --hp /home/{{ ansible_user }}
      become: true
      when: pm2_startup.rc == 1 # only run if the first command "failed" as expected
      changed_when: true

    - name: Wait briefly for PM2 to start processes
      pause:
        seconds: 10

    - name: Check PM2 services status before wait_for
      command: "{{ app_root }}/conda-env/bin/pm2 list"
      args:
        chdir: "{{ app_root }}"
      become_user: "{{ ansible_user }}"
      register: pm2_initial_status
      changed_when: false

    - name: Display PM2 initial status
      debug:
        msg: "{{ pm2_initial_status.stdout }}"

    - name: Check for PM2 errors
      command: "{{ app_root }}/conda-env/bin/pm2 logs --nostream"
      args:
        chdir: "{{ app_root }}"
      become_user: "{{ ansible_user }}"
      register: pm2_logs
      changed_when: false
      ignore_errors: true

    - name: Display PM2 logs for debugging
      debug:
        msg: "{{ pm2_logs.stdout }}"

    - name: Wait for services to start
      wait_for:
        port: "{{ item }}"
        delay: 5
        timeout: 60
      loop:
        - "{{ api_port }}"
        - "{{ llm_port }}"
      register: wait_result
      ignore_errors: true

    - name: Display final PM2 status
      command: "{{ app_root }}/conda-env/bin/pm2 list"
      args:
        chdir: "{{ app_root }}"
      become_user: "{{ ansible_user }}"
      register: pm2_status
      changed_when: false

    - name: Display PM2 status
      debug:
        msg: "{{ pm2_status.stdout_lines }}"

    - name: Fail if services did not start
      fail:
        msg: |
          Services failed to start within timeout period.
          API Port: {{ api_port }}
          LLM Port: {{ llm_port }}
          
          Check PM2 logs with:
          ssh {{ ansible_user }}@{{ inventory_hostname }} "cd {{ app_root }} && conda-env/bin/pm2 logs"
          
          Or check individual service logs:
          - API: {{ app_root }}/apps/api-service/api.log
          - LLM: {{ app_root }}/apps/llm-service/llm.log
      when: >-
        wait_result is defined and
        (wait_result.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list | length) > 0

    - name: Test API health endpoint
      uri:
        url: "http://localhost:{{ api_port }}/api/health"
        method: GET
        status_code: [200, 404]
      register: api_health
      ignore_errors: yes

    - name: Display API health status
      debug:
        msg: "API Service: {{ 'HEALTHY' if api_health.status == 200 else 'STARTED (health endpoint may not exist)' }}"

    - name: Test LLM health endpoint
      uri:
        url: "http://localhost:{{ llm_port }}/health"
        method: GET
        status_code: 200
      register: llm_health
      retries: 6
      delay: 5
      until: llm_health.status is defined and llm_health.status == 200
      ignore_errors: yes

    - name: Display LLM health check result
      debug:
        msg: >-
          LLM health: {{ 'OK' if not llm_health.failed else 'UNREACHABLE' }}.
          {% if not llm_health.failed %}
          server={{ llm_health.json.llama_server }},
          model={{ llm_health.json.model }},
          backend_reachable={{ llm_health.json.server_reachable }}
          {% endif %}

    - name: Warn if LLM backend is not reachable (Ollama may be cold-starting)
      debug:
        msg: >-
          WARNING: LLM backend server_reachable=false. Ollama may be cold-starting.
          Chat will work once Ollama loads the model (first request may be slow).
          Expected: server={{ llama_server_url }}, model={{ llama_model }}.
          Got: {{ llm_health.json | default({}) }}
      when:
        - not llm_health.failed
        - not (llm_health.json.server_reachable | bool)

    - name: Assert deployed LLM config matches resolved configuration
      assert:
        that:
          - llm_health.json.llama_server == llama_server_url
          - llm_health.json.model == llama_model
        fail_msg: >-
          LLM config mismatch! Expected server={{ llama_server_url }}, model={{ llama_model }}.
          Got {{ llm_health.json }}. Check that llama_api_type/llama_server_url/llama_model
          are set correctly in inventory and group_vars.
        success_msg: "✅ LLM config matches resolved configuration"
      when: not llm_health.failed

    - name: Display completion message
      debug:
        msg:
          - "✅ Application deployment completed successfully!"
          - ""
          - "Services Status:"
          - "  API Service: Running on port {{ api_port }}"
          - "  LLM Service: Running on port {{ llm_port }}"
          - ""
          - "Next step: Run 04-nginx-setup.yml to configure web server"
