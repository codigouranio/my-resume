---
# Global variables for all hosts
# Override these in inventory.yml or host_vars/

# Application Configuration
app_name: my-resume
app_root: /opt/my-resume
repo_url: https://github.com/codigouranio/my-resume.git
repo_branch: main

# Application Paths
api_service_path: "{{ app_root }}/apps/api-service"
llm_service_path: "{{ app_root }}/apps/llm-service"
frontend_path: "{{ app_root }}/apps/my-resume"

# Service Ports
api_port: 3000
llm_port: 5000
frontend_port: 3001

# Node.js Configuration
nodejs_version: "20"

# PostgreSQL Configuration
postgres_version: 15
postgres_port: 5432
postgres_max_connections: 100

jwt_secret: "{{ vault_jwt_secret | default('CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_STRING') }}"

aws_region: "{{ vault_aws_region | default('us-east-1') }}"
aws_access_key_id: "{{ vault_aws_access_key_id | default('') }}"
aws_secret_access_key: "{{ vault_aws_secret_access_key | default('') }}"
ses_from_email: "{{ vault_ses_from_email | default('noreply@resumecast.ai') }}"

ses_reply_to_email: "{{ vault_ses_reply_to_email | default('noreply@resumecast.ai') }}"
ses_template_name: "ResumeAccessNotification"

db_password: "{{ vault_db_password | default('CHANGE_ME_IN_PRODUCTION') }}"

llm_admin_token: "{{ vault_llm_admin_token | default('CHANGE_ME_IN_PRODUCTION') }}"

stripe_secret_key: "{{ vault_stripe_secret_key | default('') }}"
stripe_webhook_secret: "{{ vault_stripe_webhook_secret | default('') }}"
stripe_price_id: "{{ vault_stripe_price_id | default('') }}"

# Database Configuration (use ansible-vault for passwords!)
db_name: resume_db
db_user: resume_user

# Legacy compatibility
postgres_db: "{{ db_name }}"
postgres_user: "{{ db_user }}"
postgres_password: "{{ db_password }}"

# LLM Service Configuration
llama_model: "llama3.1"
llama_server_url: "http://localhost:11434"
llama_api_type: "vllm"  # Options: llama-cpp, ollama, openai, vllm
vllm_model: "Qwen/Qwen2.5-7B-Instruct"
vllm_server_url: "http://localhost:9000"

# Redis Configuration for LLM Service Celery
# Shared Redis with different database for MVP simplicity
llm_redis_host: "localhost"
llm_redis_port: 6379  # Same as API Redis
llm_redis_db: 1       # Different database (API uses 0)
llm_redis_password: "" # Optional

# Celery Configuration
celery_worker_concurrency: 2
celery_max_tasks_per_child: 50
flower_port: 5555
flower_enabled: true

# Webhook Security
llm_webhook_secret: "{{ vault_llm_webhook_secret | default('CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS') }}"

# LLM API Key Authentication
llm_authorized_api_keys: "{{ vault_llm_authorized_api_keys }}"  # Keys authorized to call LLM service
llm_api_key: "{{ vault_llm_api_key }}"  # Key API service uses to call LLM service

# JWT Service-to-Service Authentication (LLM ↔ API)
llm_service_username: "{{ vault_llm_service_username | default('llm-service') }}"  # Username for LLM→API JWT auth
llm_service_password: "{{ vault_llm_service_password | default('CHANGE_ME_IN_PRODUCTION') }}"  # Password for LLM→API JWT auth

# PM2 Configuration
pm2_instances_api: 2
pm2_max_memory_restart: "512M"

# Nginx Configuration
enable_ssl: false # Set to true for Let's Encrypt SSL
domain: "{{ ansible_host }}" # Override with your domain
domain_paskot: "paskot.com"

# CloudFlare Configuration (optional)
enable_cloudflare: false
cloudflare_real_ip: false

# Backup Configuration
enable_backups: true
backup_retention_days: 7
backup_path: /opt/backups/my-resume

# Monitoring Configuration
enable_monitoring: false
monitoring_port: 9090

# Security
enable_firewall: true
allowed_ssh_ips: [] # Empty = allow all, or specify IPs like ['1.2.3.4']
fail2ban_enabled: true

# Application Environment
node_env: production
enable_source_maps: true
enable_debug_logging: true
frontend_url: "https://app-test.resumecast.ai"
api_service_url: "https://api-test.resumecast.ai"
frontend_reserved_hostnames:
  - "staging-test.resumecast.ai"
  - "www.staging-test.resumecast.ai"

# Analytics Configuration (optional - set in production)
gtm_id: "" # e.g., GTM-XXXXXXX
ga_id: "" # e.g., G-XXXXXXXXXX

# CORS Configuration - Updated for Cloudflare Tunnel subdomain routing
cors_origins:
  - "http://localhost:3001"
  - "https://{{ domain }}"
  - "https://api.{{ domain }}"
  - "https://llm.{{ domain }}"
  - "https://*.{{ domain }}"
