---
# Update services with latest code changes (no downtime)
# Usage: ansible-playbook update-services.yml --ask-vault-pass --ask-become-pass

- name: "🔄 Update Services with Latest Changes"
  hosts: all
  become: yes
  become_user: "{{ ansible_user }}"
  vars_files:
    - group_vars/all.yml
  
  tasks:
    - name: Pre-flight check - Verify app directory exists
      stat:
        path: "{{ app_root }}"
      register: app_root_check
      failed_when: not app_root_check.stat.exists

    - name: Pre-flight check - Find PM2 location
      shell: |
        # Try common PM2 locations
        if [ -f "/home/{{ ansible_user }}/.npm-global/bin/pm2" ]; then
          echo "/home/{{ ansible_user }}/.npm-global/bin/pm2"
          exit 0
        fi
        
        if command -v pm2 >/dev/null 2>&1; then
          which pm2
          exit 0
        fi
        
        # PM2 not found
        echo "NOT_FOUND"
        exit 0
      register: pm2_location
      changed_when: false
      failed_when: false

    - name: Set PM2 path variable
      set_fact:
        pm2_cmd: "{{ (pm2_location.stdout | trim) if (pm2_location.stdout and pm2_location.stdout | trim != '' and pm2_location.stdout != 'NOT_FOUND') else 'NOT_FOUND' }}"

    - name: Debug PM2 location
      debug:
        msg: "PM2 command: '{{ pm2_cmd }}' (stdout was: '{{ pm2_location.stdout }}')"

    - name: Display PM2 status
      debug:
        msg: "PM2 found at: {{ pm2_cmd }}"
      when: pm2_cmd != "NOT_FOUND"

    - name: Warning if PM2 not found
      debug:
        msg: "WARNING: PM2 not found. Services will not be restarted. Run full deployment first."
      when: pm2_cmd == "NOT_FOUND"

    - name: Check API conda environment
      stat:
        path: "{{ api_service_path }}/conda-env"
      register: api_conda_env

    - name: Check Frontend conda environment
      stat:
        path: "{{ frontend_path }}/conda-env"
      register: frontend_conda_env

    - name: Stash any local changes before git pull
      shell: |
        cd {{ app_root }}
        git stash || true
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Pull latest code from git
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_root }}"
        version: "{{ repo_branch }}"
        force: yes
      register: git_result

    - name: Display git changes
      debug:
        msg: "Git updated: {{ git_result.changed }}"

    - name: Configure API Service environment
      copy:
        dest: "{{ api_service_path }}/.env"
        content: |
          DATABASE_URL="postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}?schema=public"
          JWT_SECRET="{{ jwt_secret }}"
          PORT={{ api_port }}
          NODE_ENV={{ node_env }}
          LLM_SERVICE_URL="http://localhost:{{ llm_port }}"
          LLM_WEBHOOK_SECRET="{{ llm_webhook_secret }}"
          CORS_ORIGINS="{{ cors_origins | join(',') }}"
          STRIPE_SECRET_KEY={{ stripe_secret_key | default('sk_test_placeholder_not_configured') }}
          STRIPE_WEBHOOK_SECRET={{ stripe_webhook_secret | default('whsec_placeholder_not_configured') }}
          STRIPE_PRICE_ID={{ stripe_price_id | default('price_placeholder_not_configured') }}
          AWS_REGION={{ aws_region | default('us-east-1') }}
          AWS_ACCESS_KEY_ID={{ aws_access_key_id | default('') }}
          AWS_SECRET_ACCESS_KEY={{ aws_secret_access_key | default('') }}
          SES_FROM_EMAIL={{ ses_from_email | default('noreply@resumecast.ai') }}
          FRONTEND_URL={{ frontend_url | default('https://resumecast.ai') }}
        owner: "{{ ansible_user }}"
        mode: '0600'
      register: api_env_result

    - name: Configure LLM Service environment
      copy:
        dest: "{{ llm_service_path }}/.env"
        content: |
          PORT={{ llm_port }}
          LLAMA_SERVER_URL={{ llama_server_url }}
          LLAMA_API_TYPE={{ llama_api_type }}
          LLAMA_MODEL={{ llama_model }}
          RESUME_PATH=../../data/resume.md
          DATABASE_URL=postgresql://{{ db_user }}:{{ db_password }}@localhost:{{ postgres_port }}/{{ db_name }}
          ADMIN_TOKEN={{ llm_admin_token }}
          API_BASE_URL={{ api_service_url }}/api
          RESUME_SLUG=jose-blanco-swe
          LLM_WEBHOOK_SECRET={{ llm_webhook_secret }}
          REDIS_HOST={{ llm_redis_host }}
          REDIS_PORT={{ llm_redis_port }}
          REDIS_DB={{ llm_redis_db }}
          REDIS_PASSWORD={{ llm_redis_password }}
          CELERY_BROKER_URL=redis://{{ llm_redis_host }}:{{ llm_redis_port }}/{{ llm_redis_db }}
          CELERY_RESULT_BACKEND=redis://{{ llm_redis_host }}:{{ llm_redis_port }}/{{ llm_redis_db }}
          FLOWER_PORT={{ flower_port }}
        owner: "{{ ansible_user }}"
        mode: '0600'
      register: llm_env_result

    - name: Configure Frontend environment
      copy:
        dest: "{{ frontend_path }}/.env"
        content: |
          PUBLIC_API_URL=https://api.{{ domain }}
          PUBLIC_LLM_API_URL=https://llm.{{ domain }}
          PUBLIC_BASE_DOMAIN={{ domain }}
          PUBLIC_GTM_ID={{ gtm_id }}
          PUBLIC_GA_ID={{ ga_id }}
        owner: "{{ ansible_user }}"
        mode: '0644'
      register: frontend_env_result

    # API Service
    - name: Ensure API dist ownership
      command: "chown -R {{ ansible_user }}:{{ ansible_user }} {{ api_service_path }}/dist"
      become: yes
      become_user: root
      ignore_errors: yes

    - name: Install API dependencies
      shell: |
        if [ -d "{{ api_service_path }}/conda-env" ]; then
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate {{ api_service_path }}/conda-env
        fi
        npm install
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      when: git_result.changed

    - name: Generate Prisma Client
      shell: |
        if [ -d "{{ api_service_path }}/conda-env" ]; then
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate {{ api_service_path }}/conda-env
        fi
        npx prisma generate
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      when: git_result.changed

    - name: Build API Service
      shell: |
        if [ -d "{{ api_service_path }}/conda-env" ]; then
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate {{ api_service_path }}/conda-env
        fi
        npm run build
      args:
        chdir: "{{ api_service_path }}"
        executable: /bin/bash
      when: git_result.changed

    - name: Restart API Service
      shell: |
        if {{ pm2_cmd }} list | grep -q "api-service"; then
          {{ pm2_cmd }} restart api-service
        else
          echo "api-service not running in PM2, skipping restart"
        fi
      args:
        executable: /bin/bash
      when: 
        - pm2_cmd != "NOT_FOUND"
        - git_result.changed or api_env_result.changed

    # LLM Service (no build needed, Python)
    - name: Update LLM Service dependencies with Poetry
      shell: |
        export PATH="$HOME/.local/bin:$PATH"
        # Check if poetry is installed
        if ! command -v poetry &> /dev/null; then
          echo "Poetry not found in PATH: $PATH"
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"
        fi
        cd {{ llm_service_path }}
        poetry install --no-root
      args:
        executable: /bin/bash
      when: git_result.changed
    
    - name: Restart LLM Service
      shell: |
        if {{ pm2_cmd }} list | grep -q "llm-service"; then
          {{ pm2_cmd }} restart llm-service
        else
          echo "llm-service not running in PM2, skipping restart"
        fi
      args:
        executable: /bin/bash
      when:
        - pm2_cmd != "NOT_FOUND"
        - git_result.changed or llm_env_result.changed
    
    - name: Restart Celery Worker
      shell: |
        if {{ pm2_cmd }} list | grep -q "llm-celery-worker"; then
          {{ pm2_cmd }} restart llm-celery-worker
        else
          echo "llm-celery-worker not running in PM2, skipping restart"
        fi
      args:
        executable: /bin/bash
      when:
        - pm2_cmd != "NOT_FOUND"
        - git_result.changed or llm_env_result.changed
    
    - name: Restart Flower Dashboard
      shell: |
        if {{ pm2_cmd }} list | grep -q "llm-flower"; then
          {{ pm2_cmd }} restart llm-flower
        else
          echo "llm-flower not running in PM2, skipping restart"
        fi
      args:
        executable: /bin/bash
      when:
        - pm2_cmd != "NOT_FOUND"
        - (git_result.changed or llm_env_result.changed) and flower_enabled | default(true)

    # Frontend
    - name: Clean frontend node_modules and lock file
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ frontend_path }}/node_modules"
        - "{{ frontend_path }}/package-lock.json"
      when: git_result.changed

    - name: Install frontend dependencies
      shell: |
        if [ -d "{{ frontend_path }}/conda-env" ]; then
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate {{ frontend_path }}/conda-env
        fi
        npm install
      args:
        chdir: "{{ frontend_path }}"
        executable: /bin/bash
      when: git_result.changed

    - name: Build frontend
      shell: |
        if [ -d "{{ frontend_path }}/conda-env" ]; then
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate {{ frontend_path }}/conda-env
        fi
        npm run build
      args:
        chdir: "{{ frontend_path }}"
        executable: /bin/bash
      when: git_result.changed or frontend_env_result.changed

    - name: Get PM2 status after update
      shell: "{{ pm2_cmd }} list"
      register: pm2_final_status
      changed_when: false
      when: pm2_cmd != "NOT_FOUND"
      failed_when: false

    - name: Display completion message
      debug:
        msg: |
          ✅ Services updated successfully!
          
          Git changes: {{ git_result.changed }}
          API env updated: {{ api_env_result.changed }}
          LLM env updated: {{ llm_env_result.changed }}
          Frontend env updated: {{ frontend_env_result.changed }}
          
          {% if pm2_cmd != "NOT_FOUND" %}
          PM2 Status:
          {{ pm2_final_status.stdout }}
          
          Next steps:
          - Check status: ssh {{ ansible_user }}@{{ ansible_host }} '{{ pm2_cmd }} status'
          - View logs: ssh {{ ansible_user }}@{{ ansible_host }} '{{ pm2_cmd }} logs'
          - Test API: curl http://{{ ansible_host }}:{{ api_port }}/api/health
          - Access Flower: ssh -L 5555:localhost:5555 {{ ansible_user }}@{{ ansible_host }}
          {% else %}
          ⚠️  WARNING: PM2 not found on server!
          
          Services were NOT restarted. To complete setup:
          1. Run full deployment: ansible-playbook playbooks/03-application-deploy.yml --ask-become-pass --ask-vault-pass
          2. Or manually start services:
             ssh {{ ansible_user }}@{{ ansible_host }}
             cd {{ app_root }}
             pm2 start ecosystem.config.js
             pm2 save
          {% endif %}
