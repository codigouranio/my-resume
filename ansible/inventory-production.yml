---
# Production Inventory Example
# Copy this file and customize for your environment

all:
  children:
    production:
      hosts:
        prod-server-1:
          ansible_host: 172.16.23.127
          ansible_user: jose
          ansible_python_interpreter: /usr/bin/python3
          llama_api_type: ollama
          llama_server_url: http://localhost:11434
          llama_model: llama3.1
          # Override domain for this specific server
          domain: resumecast.ai 
          enable_cloudflare: true
          cloudflare_real_ip: true
          
        # Add more production servers as needed
        # prod-server-2:
        #   ansible_host: 172.16.23.128
        #   ansible_user: deploy
        #   domain: my-resume-backup.example.com
    
    staging:
      hosts:
        staging-server:
          ansible_host: 192.168.1.100
          ansible_user: deploy
          ansible_python_interpreter: /usr/bin/python3
          domain: staging.my-resume.example.com
          frontend_server_names: staging-test.resumecast.ai www.staging-test.resumecast.ai
          frontend_url: https://staging-test.resumecast.ai
          frontend_public_api_url: /api
          frontend_public_llm_url: https://llm.resumecast.ai
          frontend_public_base_domain: staging-test.resumecast.ai
          cors_origins:
            - "http://localhost:3001"
            - "https://staging-test.resumecast.ai"
            - "https://www.staging-test.resumecast.ai"
            - "https://api.resumecast.ai"
            - "https://api.staging-test.resumecast.ai"
          node_env: staging
          enable_debug_logging: true
          enable_cloudflare: true
          cloudflare_real_ip: true
          pm2_instances_api: 1
    
    # Database servers (if separate from app servers)
    # database:
    #   hosts:
    #     db-server:
    #       ansible_host: 172.16.23.130
    #       ansible_user: postgres
    #       postgres_max_connections: 200

  vars:
    # Global variables that apply to all hosts
    # These can be overridden in group_vars/all.yml or per-host above
    
    # Security - USE ANSIBLE-VAULT FOR PRODUCTION!
    # Run: ansible-vault encrypt_string 'your_password' --name 'vault_db_password'
    # Then paste the output here
    # vault_db_password: !vault |
    #       $ANSIBLE_VAULT;1.1;AES256
    #       # EXAMPLE - Replace with your encrypted value
    #       # Use: ansible-vault encrypt_string 'actual_password' --name 'vault_db_password'
    
    # Or for development/testing, use plain text (NOT RECOMMENDED for production)
    vault_db_password: "secure_db_password_change_me"
    db_password: "secure_db_password_change_me"
    jwt_secret: "change_me_use_long_random_string_min_32_chars"
    llm_admin_token: "change_me_in_production"
    
    # LLM Service API Key Authentication
    # Generate with: openssl rand -hex 32
    # Encrypt with: ansible-vault encrypt_string 'your-key' --name 'vault_llm_api_key'
    vault_llm_api_key: "change_me_in_production"  # Key API service uses to call LLM
    # Encrypt with: ansible-vault encrypt_string '{"api-service": "key1", "admin": "key2"}' --name 'vault_llm_authorized_api_keys'
    vault_llm_authorized_api_keys: '{"api-service": "change_me_in_production"}'  # Keys authorized to call LLM service
    
    # JWT Service-to-Service Authentication (LLM ↔ API)
    # Encrypt with: ansible-vault encrypt_string 'llm-service' --name 'vault_llm_service_username'
    vault_llm_service_username: "llm-service"  # Username for JWT auth
    # Generate with: openssl rand -hex 32, then encrypt
    # Encrypt with: ansible-vault encrypt_string 'generated-password' --name 'vault_llm_service_password'
    vault_llm_service_password: "change_me_in_production"  # Password for JWT auth
